name: Sync OHDSI Images to Aliyun

on:
  workflow_dispatch:
    inputs:
      image_full_name:
        description: '原始镜像全名（如 ohdsi/webapi）'
        required: true
        default: 'ohdsi/webapi'
        type: string
      image_tag:
        description: '镜像标签（如 latest）'
        required: true
        default: 'latest'
        type: string
      repo_short_name:
        description: '阿里云仓库短名（如 webapi）'
        required: true
        default: 'webapi'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 安装 skopeo
      - name: Install skopeo
        run: |
          wget https://github.com/lework/skopeo-binary/releases/download/v1.22.0/skopeo-linux-amd64
          chmod +x skopeo-linux-amd64
          sudo mv skopeo-linux-amd64 /usr/local/bin/skopeo
          skopeo --version

      # 登录阿里云
      - name: Login to Aliyun ACR
        run: |
          skopeo login \
            --username "${{ secrets.ALIYUN_USERNAME }}" \
            --password "${{ secrets.ALIYUN_PASSWORD }}" \
            "${{ secrets.ALIYUN_REGISTRY }}"

      # 同步镜像
      - name: Sync image
        run: |
          SOURCE="docker://docker.io/${{ github.event.inputs.image_full_name }}:${{ github.event.inputs.image_tag }}"
          TARGET="docker://${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.inputs.repo_short_name }}:${{ github.event.inputs.image_tag }}"
          
          echo "源: $SOURCE"
          echo "目标: $TARGET"
          
          skopeo copy --all "$SOURCE" "$TARGET"
          
          echo "同步完成！"
          echo ""
          echo "拉取命令："
          echo "docker pull ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.inputs.repo_short_name }}:${{ github.event.inputs.image_tag }}"
