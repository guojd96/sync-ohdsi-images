name: Sync OHDSI Images to Aliyun

on:
  # 手动触发，这样你可以控制何时同步
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像名称（如 ohdsi/webapi）'
        required: true
        default: 'ohdsi/webapi'
        type: string
      image_tag:
        description: '镜像标签（如 latest）'
        required: true
        default: 'latest'
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：安装 skopeo
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      # 步骤 2：登录阿里云镜像仓库
      - name: Login to Aliyun ACR
        run: |
          skopeo login \
            --username "${{ secrets.ALIYUN_USERNAME }}" \
            --password "${{ secrets.ALIYUN_PASSWORD }}" \
            "${{ secrets.ALIYUN_REGISTRY }}"

      # 步骤 3：同步镜像（从 Docker Hub 到阿里云）
      - name: Sync image to Aliyun
        run: |
          echo "正在同步镜像: ${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}"
          skopeo copy \
            --all \
            docker://docker.io/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }} \
            docker://${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}
          
          echo "同步完成！镜像地址："
          echo "${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}"
